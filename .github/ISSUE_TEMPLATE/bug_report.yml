name: Bug report
description: Report a reproducible Flower problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest steps or code sample that reproduces the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Flower version
      placeholder: 0.1.0-SNAPSHOT or commit SHA
    validations:
      required: true
  - type: input
    id: java
    attributes:
      label: Java version
      placeholder: java -version
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, stack traces, module names, or design context.

