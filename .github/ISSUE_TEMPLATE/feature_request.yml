name: Feature request
description: Suggest a Flower improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Flower use case is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What workarounds or designs have you considered?
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - flower-core
        - persistence or event loop
        - Spring Boot integration
        - observability or testkit
        - flower-check tooling
        - documentation

