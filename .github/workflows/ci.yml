name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - pom.xml
      - flower-core/**
      - flower-persistence-jdbc/**
      - flower-bloom-adapter/**
      - flower-spring-boot-starter/**
      - flower-observability/**
      - flower-testkit/**
      - flower-check-annotations/**
      - flower-check/**
      - flower-check-maven-plugin/**
      - flower-check-gradle-plugin/**
      - .github/scripts/**
      - .github/workflows/ci.yml

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout Bloom
        uses: actions/checkout@v4
        with:
          repository: parkKevinSB/bloom
          path: bloom
          token: ${{ secrets.PACKAGE_READ_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install Bloom Core locally
        run: mvn -B -f bloom/pom.xml -pl bloom-core -am install

      - name: Verify build and flower-check
        run: mvn -B verify

      - name: Install flower-check artifacts locally
        run: mvn -B -pl flower-check,flower-check-annotations -am install -DskipTests

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Verify Gradle plugin
        run: gradle -p flower-check-gradle-plugin --no-daemon check
