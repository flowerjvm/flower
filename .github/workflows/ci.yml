name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - pom.xml
      - flower-core/**
      - flower-eventloop/**
      - flower-persistence-jdbc/**
      - flower-eventloop-persistence-jdbc/**
      - flower-spring-boot-starter/**
      - flower-observability/**
      - flower-testkit/**
      - flower-check-annotations/**
      - flower-check/**
      - flower-check-maven-plugin/**
      - flower-check-gradle-plugin/**
      - .github/scripts/**
      - .github/workflows/ci.yml
      - .github/workflows/release-gradle-plugin.yml
  pull_request:
    paths:
      - pom.xml
      - flower-core/**
      - flower-eventloop/**
      - flower-persistence-jdbc/**
      - flower-eventloop-persistence-jdbc/**
      - flower-spring-boot-starter/**
      - flower-observability/**
      - flower-testkit/**
      - flower-check-annotations/**
      - flower-check/**
      - flower-check-maven-plugin/**
      - flower-check-gradle-plugin/**
      - .github/scripts/**
      - .github/workflows/ci.yml
      - .github/workflows/release-gradle-plugin.yml

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify build and flower-check
        run: mvn -B verify

      - name: Install flower-check artifacts locally
        run: mvn -B -pl flower-check,flower-check-annotations -am install -DskipTests

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Verify and stage Gradle plugin publications
        run: >-
          gradle -p flower-check-gradle-plugin --no-daemon
          check publishAllPublicationsToStagingRepository jreleaserConfig
        env:
          JRELEASER_DRY_RUN: 'true'
          JRELEASER_GPG_SECRET_KEY: unused-for-config-validation
          JRELEASER_GPG_PASSPHRASE: unused-for-config-validation
          JRELEASER_MAVENCENTRAL_USERNAME: unused-for-config-validation
          JRELEASER_MAVENCENTRAL_PASSWORD: unused-for-config-validation
