name: Publish Snapshot

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - pom.xml
      - flower-core/**
      - flower-persistence-jdbc/**
      - flower-bloom-adapter/**
      - flower-spring-boot-starter/**
      - flower-observability/**
      - flower-testkit/**
      - flower-check/**
      - .github/workflows/publish.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Configure GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
              <server>
                <id>github-bloom</id>
                <username>${env.PACKAGE_READ_USER}</username>
                <password>${env.PACKAGE_READ_TOKEN}</password>
              </server>
            </servers>
            <profiles>
              <profile>
                <id>github-packages</id>
                <repositories>
                  <repository>
                    <id>github-bloom</id>
                    <url>https://maven.pkg.github.com/parkkevinsb/bloom</url>
                    <releases>
                      <enabled>true</enabled>
                    </releases>
                    <snapshots>
                      <enabled>true</enabled>
                    </snapshots>
                  </repository>
                </repositories>
              </profile>
            </profiles>
            <activeProfiles>
              <activeProfile>github-packages</activeProfile>
            </activeProfiles>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_READ_USER: ${{ secrets.PACKAGE_READ_USER || github.actor }}
          PACKAGE_READ_TOKEN: ${{ secrets.PACKAGE_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Verify build
        run: mvn -B -U verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_READ_USER: ${{ secrets.PACKAGE_READ_USER || github.actor }}
          PACKAGE_READ_TOKEN: ${{ secrets.PACKAGE_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: mvn -B -U -DskipTests deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_READ_USER: ${{ secrets.PACKAGE_READ_USER || github.actor }}
          PACKAGE_READ_TOKEN: ${{ secrets.PACKAGE_READ_TOKEN || secrets.GITHUB_TOKEN }}
