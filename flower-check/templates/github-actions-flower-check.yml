name: Flower Check

on:
  pull_request:
    paths:
      - pom.xml
      - src/**
      - flower-check.config
      - .github/workflows/flower-check.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      # Required when flower-check artifacts are consumed from GitHub Packages.
      # For cross-repository/private package access, replace GITHUB_TOKEN with a
      # read:packages token stored as FLOWER_PACKAGE_READ_TOKEN.
      - name: Configure GitHub Packages
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 https://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${env.GITHUB_ACTOR}</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Flower usage
        run: mvn -B verify
